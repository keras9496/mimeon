services:
  - type: web
    name: mimeon
    runtime: python
    plan: free
    buildCommand: cd frontend && npm ci && npm run build && cd ../backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: AIRKOREA_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://mimeon.onrender.com
      - key: VITE_KAKAO_MAP_KEY
        sync: false
