services:
  - type: web
    name: mimeon
    runtime: python
    plan: starter
    buildCommand: cd frontend && npm ci && npm run build && cd ../backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    disk:
      name: mimeon-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: AIRKOREA_API_KEY
        sync: false
      - key: KAKAO_REST_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://mimeon.onrender.com
      - key: VITE_KAKAO_MAP_KEY
        sync: false
      - key: MIMEON_DB_PATH
        value: /var/data/mimeon.db
